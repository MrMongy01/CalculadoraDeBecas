<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Becas</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Calculadora de Becas y Financiamiento</h1>

        <label>Promedio:</label>
        <input type="number" id="promedio" min="0" max="100">

        <label>Costo de colegiatura:</label>
        <input type="number" id="colegiatura">

        <label>Meses a financiar:</label>
        <input type="number" id="meses">

        <button onclick="calcular()">Calcular</button>

        <div id="resultado"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
